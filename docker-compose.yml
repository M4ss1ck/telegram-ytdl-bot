services:
  bot:
    build:
      context: .
      target: development  # Matches Dockerfile stage name
    volumes:
      - ./.env:/app/.env:ro
      - ./secrets/instagram-cookies.txt:/run/secrets/instagram-cookies.txt:ro
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
        - action: rebuild
          path: ./Dockerfile
          target: development
